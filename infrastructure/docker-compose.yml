services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "16379:6379"

  aggregator1:
    build:
      context: ..
      dockerfile: infrastructure/docker/aggregator.Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    ports:
      - "8000:8000"

  aggregator2:
    build:
      context: ..
      dockerfile: infrastructure/docker/aggregator.Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    ports:
      - "8001:8000"

  agent_workstation:
    build:
      context: ..
      dockerfile: infrastructure/docker/agent.Dockerfile
    environment:
      - AGENT_ID=agent_workstation_1
      - AGENT_TYPE=workstation
      - AGGREGATOR=http://aggregator1:8000/ingest
      - AGENT_CONFIG_PATH=configs/workstation.yaml
    depends_on:
      - aggregator1
      - redis

  agent_web_server:
    build:
      context: ..
      dockerfile: infrastructure/docker/agent.Dockerfile
    environment:
      - AGENT_ID=agent_web_server_1
      - AGENT_TYPE=web_server
      - AGGREGATOR=http://aggregator1:8000/ingest
      - AGENT_CONFIG_PATH=configs/web_server.yaml
    depends_on:
      - aggregator1
      - redis

  agent_firewall:
    build:
      context: ..
      dockerfile: infrastructure/docker/agent.Dockerfile
    environment:
      - AGENT_ID=agent_firewall_1
      - AGENT_TYPE=firewall
      - AGGREGATOR=http://aggregator1:8000/ingest
      - AGENT_CONFIG_PATH=configs/firewall.yaml
    depends_on:
      - aggregator1
      - redis

  agent_dns_server:
    build:
      context: ..
      dockerfile: infrastructure/docker/agent.Dockerfile
    environment:
      - AGENT_ID=agent_dns_server_1
      - AGENT_TYPE=dns_server
      - AGGREGATOR=http://aggregator2:8000/ingest
      - AGENT_CONFIG_PATH=configs/dns_server.yaml
    depends_on:
      - aggregator2
      - redis

  agent_file_server:
    build:
      context: ..
      dockerfile: infrastructure/docker/agent.Dockerfile
    environment:
      - AGENT_ID=agent_file_server_1
      - AGENT_TYPE=file_server
      - AGGREGATOR=http://aggregator2:8000/ingest
      - AGENT_CONFIG_PATH=configs/file_server.yaml
    depends_on:
      - aggregator2
      - redis

  agent_vpn_gateway:
    build:
      context: ..
      dockerfile: infrastructure/docker/agent.Dockerfile
    environment:
      - AGENT_ID=agent_vpn_gateway_1
      - AGENT_TYPE=vpn_gateway
      - AGGREGATOR=http://aggregator2:8000/ingest
      - AGENT_CONFIG_PATH=configs/vpn_gateway.yaml
    depends_on:
      - aggregator2
      - redis

  postgres:
    image: postgres:15
    container_name: siem_postgres
    environment:
      POSTGRES_DB: siem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: siem_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/siem
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_FEATURES: "preview"
      KC_IMPORT_STRATEGY: OVERWRITE_EXISTING
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /realms/siem2 HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file:
      - ../shared/.env
      - ../services/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8002:8000"

  detection_worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    environment:
      PYTHONPATH: /app:/app/services/backend
      DJANGO_SETTINGS_MODULE: config.settings
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://postgres:password@postgres:5432/siem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "cd /app/services/backend && python manage.py detection_worker"
    env_file:
      - ../shared/.env
      - ../services/backend/.env

volumes:
  postgres_data:
