  auth: 0.05
  web: 0.20
  dns: 0.05
  process: 0.40
  file_access: 0.30

log_probabilities:
  auth:
    ssh_login_success: 0.10
    ssh_login_failure: 0.01
    invalid_user: 0.05
    sudo_command: 0.74
    user_logout: 0.10

  web:
    page_access: 0.46
    login_request: 0.05
    admin_access_denied: 0.01
    directory_traversal: 0.01
    api_access: 0.46

  dns:
    dns_query: 0.30
    internal_lookup: 0.30
    suspicious_domain: 0.01
    cloud_lookup: 0.30
